name: Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: STTTool
  RELEASES_REPO: Lichers0/stt-tool-releases

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: xcodebuild -resolvePackageDependencies -project ${{ env.APP_NAME }}.xcodeproj -scheme ${{ env.APP_NAME }}

      - name: Build archive
        run: |
          xcodebuild archive \
            -project ${{ env.APP_NAME }}.xcodeproj \
            -scheme ${{ env.APP_NAME }} \
            -configuration Release \
            -archivePath build/${{ env.APP_NAME }}.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app from archive
        run: |
          cp -R "build/${{ env.APP_NAME }}.xcarchive/Products/Applications/${{ env.APP_NAME }}.app" "build/${{ env.APP_NAME }}.app"

      - name: Create ZIP
        run: |
          cd build
          ditto -c -k --keepParent "${{ env.APP_NAME }}.app" "${{ env.APP_NAME }}.zip"

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sign update with Sparkle
        id: sparkle_sign
        run: |
          # Download Sparkle tools
          SPARKLE_VERSION="2.5.2"
          curl -L "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o sparkle.tar.xz
          mkdir sparkle-tools
          tar -xf sparkle.tar.xz -C sparkle-tools

          # Sign the zip
          SIGN_OUTPUT=$(echo "${{ secrets.SPARKLE_PRIVATE_KEY }}" | ./sparkle-tools/bin/sign_update "build/${{ env.APP_NAME }}.zip" --ed-key-file -)
          echo "signature=${SIGN_OUTPUT}" >> "$GITHUB_OUTPUT"

          # Get file size
          FILE_SIZE=$(stat -f%z "build/${{ env.APP_NAME }}.zip")
          echo "file_size=${FILE_SIZE}" >> "$GITHUB_OUTPUT"

      - name: Create release in public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "build/${{ env.APP_NAME }}.zip" \
            --repo "${{ env.RELEASES_REPO }}" \
            --title "${{ env.APP_NAME }} ${{ steps.version.outputs.version }}" \
            --notes "Release ${{ steps.version.outputs.version }}"

      - name: Update appcast.xml
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SIGNATURE="${{ steps.sparkle_sign.outputs.signature }}"
          FILE_SIZE="${{ steps.sparkle_sign.outputs.file_size }}"
          DOWNLOAD_URL="https://github.com/${{ env.RELEASES_REPO }}/releases/download/${{ github.ref_name }}/${{ env.APP_NAME }}.zip"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")

          # Clone public repo
          git clone "https://x-access-token:${{ secrets.RELEASES_PAT }}@github.com/${{ env.RELEASES_REPO }}.git" public-repo
          cd public-repo

          # Build new item XML
          NEW_ITEM="            <item>
                      <title>Version ${VERSION}</title>
                      <sparkle:version>${VERSION}</sparkle:version>
                      <pubDate>${PUB_DATE}</pubDate>
                      <enclosure
                          url=\"${DOWNLOAD_URL}\"
                          ${SIGNATURE}
                          type=\"application/octet-stream\"
                          sparkle:version=\"${VERSION}\"
                      />
                  </item>"

          # Insert before </channel>
          sed -i '' "s|</channel>|${NEW_ITEM}\n        </channel>|" appcast.xml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "release: update appcast for v${VERSION}"

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DOWNLOAD_URL="https://github.com/${{ env.RELEASES_REPO }}/releases/download/${{ github.ref_name }}/${{ env.APP_NAME }}.zip"
          SHA256=$(shasum -a 256 "build/${{ env.APP_NAME }}.zip" | awk '{print $1}')

          cd public-repo

          # Update cask formula
          sed -i '' "s|version \".*\"|version \"${VERSION}\"|" Casks/stt-tool.rb
          sed -i '' "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Casks/stt-tool.rb
          sed -i '' "s|/download/v[^/]*/|/download/v${VERSION}/|" Casks/stt-tool.rb

          git add Casks/stt-tool.rb
          git commit -m "release: update cask for v${VERSION}"
          git push
