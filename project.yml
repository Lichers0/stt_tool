name: STTTool
options:
  bundleIdPrefix: com.romodanov
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  HotKey:
    url: https://github.com/soffes/HotKey.git
    from: "0.2.1"
  Starscream:
    url: https://github.com/daltoniam/Starscream.git
    from: "4.0.8"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.5.0"

targets:
  STTTool:
    type: application
    platform: macOS
    sources:
      - path: STTTool
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.romodanov.STTTool
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: STTTool/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: STTTool/Resources/STTTool.entitlements
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        SWIFT_STRICT_CONCURRENCY: targeted
    dependencies:
      - package: WhisperKit
      - package: HotKey
      - package: Starscream
      - package: Sparkle
